name: Build binary and push Docker image

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  workflow_dispatch:

env:
  IMAGE_NAME: supray/zed2api

jobs:
  build-binary:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Zig 0.15.2
        shell: bash
        run: |
          curl -L https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz -o zig.tar.xz
          tar -xf zig.tar.xz
          sudo mv zig-x86_64-linux-0.15.2 /opt/zig
          sudo ln -sf /opt/zig/zig /usr/local/bin/zig
          zig version

      - name: Install webui dependencies
        shell: bash
        run: |
          cd webui
          npm install

      - name: Build Linux x86_64 binary
        shell: bash
        run: |
          zig build -Dtarget=x86_64-linux -Doptimize=ReleaseSafe

      - name: Prepare binary artifact
        shell: bash
        run: |
          mkdir -p dist
          cp zig-out/bin/zed2api dist/zed2api
          cp accounts.example.json dist/accounts.example.json
          chmod +x dist/zed2api

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: zed2api-linux-x86_64
          path: dist/*
          if-no-files-found: error

  docker:
    runs-on: ubuntu-latest
    needs: build-binary

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: zed2api-linux-x86_64
          path: dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref_type != 'tag' }}
            type=raw,value=${{ needs.build-binary.outputs.version }}
            type=ref,event=tag

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.binary
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
